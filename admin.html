<select id="cat-name" class="p-2 border rounded mb-2 w-full">
    <option value="Newcomer_Final">Newcomer Final</option>
    <option value="Novice_Final">Novice Final</option>
    <option value="Intermediate_Final">Intermediate Final</option>
</select>
<textarea id="raw-input" class="w-full h-40 border p-2 text-xs" placeholder="Ide a másolt szöveg..."></textarea>
<button onclick="upload()" class="bg-black text-white p-3 w-full rounded">ADATOK FELTÖLTÉSE</button>

<script>
async function upload() {
    const text = document.getElementById('raw-input').value;
    const cat = document.getElementById('cat-name').value;
    const parts = text.split('#').filter(p => p.trim() !== "");
    
    let dancers = parts.map(p => {
        const bib = p.match(/^(\d+)/)[1];
        let name = p.replace(bib, '').replace(/\d+$/, '').trim();
        let role = p.toLowerCase().includes('follower') ? 'Follower' : 'Leader';
        return { bib, name, role };
    });

    await fetch("SAJÁT_SCRIPT_URL", {
        method: "POST",
        body: JSON.stringify({ action: "upload_dancers", category: cat, data: dancers })
    });
    alert("Kész!");
}
</script>
