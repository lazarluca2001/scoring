<div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
    <div class="space-y-4">
        <input id="event-name" type="text" placeholder="Esemény fül neve (pl: KingSwing2026)" class="w-full p-3 border rounded-xl font-bold bg-blue-50">
        <input id="cat-name" type="text" placeholder="Versenykategória (pl: Novice_Final)" class="w-full p-3 border rounded-xl">
        <textarea id="raw-input" class="w-full h-32 border p-3 rounded-xl text-xs font-mono" placeholder="BibLeaderPosBibFollower massza..."></textarea>
        <button onclick="upload()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">ADATOK HOZZÁADÁSA AZ ESEMÉNYHEZ</button>
    </div>
</div>

<script>
async function upload() {
    const event = document.getElementById('event-name').value;
    const cat = document.getElementById('cat-name').value;
    const text = document.getElementById('raw-input').value;
    
    const parts = text.split('#').filter(p => p.trim() !== "");
    let dancers = parts.map(p => {
        const bib = p.match(/^(\d+)/)[1];
        let name = p.replace(bib, '').replace(/\d+$/, '').trim();
        let role = p.toLowerCase().includes('follower') ? 'Follower' : 'Leader';
        return { bib, name, role };
    });

    await fetch("https://script.google.com/macros/s/AKfycbzuv-8S8D-t2CpOeO9PAzBO7qmH0w8fZrQYMFe7-rnwSTfjFPoeEJzrfgj_5gmsgqsk/exec", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action: "upload_dancers", eventName: event, category: cat, data: dancers })
    });
    alert(cat + " hozzáadva a " + event + " laphoz!");
}
</script>
