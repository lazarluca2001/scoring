<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Döntő Rangsoroló</title>
  <style>
    :root {
      --bg: #0b0e1a;
      --panel: #181c31;
      --border: #31385f;
      --text: #f5f7ff;
      --accent: #7c9cff;
      --radius: 16px;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .rank-card {
      display: grid;
      grid-template-columns: 40px 70px 1fr 30px;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: grab;
      user-select: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .rank-card:active {
      cursor: grabbing;
    }

    .rank-card.dragging {
      opacity: 0.5;
      transform: scale(0.95);
      border-color: var(--accent);
    }

    .place-badge {
      font-weight: 800;
      color: var(--accent);
      font-size: 1.1rem;
    }

    .pair-number {
      color: #aeb6d6;
      font-weight: 600;
    }

    .leader-name {
      font-weight: 500;
    }

    .drag-icon {
      color: #4a5481;
      text-align: right;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a325a;
      padding: 10px 20px;
      border-radius: 20px;
      border: 1px solid var(--accent);
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>All-Stars Döntő</h1>
    <p style="color: #aeb6d6; font-size: 0.9rem;">Húzd a neveket a sorrend beállításához!</p>
  </div>

  <div id="rankingList" class="ranking-list"></div>

  <div class="actions">
    <button id="copyBtn">Eredmény másolása</button>
  </div>
</div>

<script>
  // Adatok a kép alapján
  let contestants = [
    { num: "#249", name: "Rafal Grzelak" },
    { num: "#359", name: "Raphael Ettedgui" },
    { num: "#389", name: "Andreas Danielsson" },
    { num: "#392", name: "Damian Gruszczyński" },
    { num: "#396", name: "Stanley Seguy" },
    { num: "#400", name: "Florian Hamm" },
    { num: "#430", name: "Allan Thivoz" },
    { num: "#443", name: "Julien Bec" },
    { num: "#860", name: "Florian Simon" },
    { num: "#876", name: "Joshua Schubert" }
  ];

  const listElement = document.getElementById('rankingList');

  function render() {
    listElement.innerHTML = '';
    contestants.forEach((person, index) => {
      const card = document.createElement('div');
      card.className = 'rank-card';
      card.draggable = true;
      card.dataset.index = index;

      card.innerHTML = `
        <div class="place-badge">${index + 1}.</div>
        <div class="pair-number">${person.num}</div>
        <div class="leader-name">${person.name}</div>
        <div class="drag-icon">☰</div>
      `;

      card.addEventListener('dragstart', handleDragStart);
      card.addEventListener('dragover', handleDragOver);
      card.addEventListener('drop', handleDrop);
      card.addEventListener('dragend', handleDragEnd);

      listElement.appendChild(card);
    });
  }

  let draggedIdx = null;

  function handleDragStart(e) {
    draggedIdx = this.dataset.index;
    this.classList.add('dragging');
  }

  function handleDragOver(e) {
    e.preventDefault();
  }

  function handleDrop(e) {
    const targetIdx = this.dataset.index;
    if (draggedIdx === null || draggedIdx === targetIdx) return;

    const movedItem = contestants.splice(draggedIdx, 1)[0];
    contestants.splice(targetIdx, 0, movedItem);
    
    render();
  }

  function handleDragEnd() {
    this.classList.remove('dragging');
    draggedIdx = null;
  }

  document.getElementById('copyBtn').addEventListener('click', async () => {
    const text = contestants.map((c, i) => `${i + 1}. hely: ${c.num} - ${c.name}`).join('\n');
    await navigator.clipboard.writeText(text);
    
    const toast = document.createElement('div');
    toast.className = 'toast show';
    toast.textContent = 'Eredmények a vágólapon!';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  });

  render();
</script>

</body>
</html>
