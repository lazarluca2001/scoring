<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&J Verseny Kezelő</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .ghost { opacity: 0.4; background: #e0f2fe; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .follower-slot:empty::after {
            content: 'Húzz ide egy követőt';
            color: #cbd5e1;
            font-size: 0.875rem;
            display: block;
            text-align: center;
            padding-top: 8px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-white shadow-sm border-b p-4 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                🕺 J&J Manager
            </h1>
            <div class="flex gap-2 items-center">
                <select id="division-select" class="p-2 border rounded text-sm bg-gray-50">
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                    <option value="All-Star">All-Star</option>
                    <option value="Champion">Champion</option>
                </select>
                <button onclick="loadCompetitionData()" id="load-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium transition">
                    Adatok Betöltése
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-6 flex flex-col md:flex-row gap-6">
        
        <div class="w-full md:w-1/3">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden sticky top-24">
                <div class="bg-blue-50 p-3 border-b border-blue-100 flex justify-between items-center">
                    <h2 class="font-bold text-blue-700 uppercase text-xs tracking-wider">Várakozó Followerek</h2>
                    <span id="follower-count" class="bg-blue-200 text-blue-800 text-xs px-2 py-1 rounded-full font-bold">0</span>
                </div>
                <div id="follower-pool" class="p-4 min-h-[400px] max-h-[70vh] overflow-y-auto space-y-2">
                    <p class="text-slate-400 text-center text-sm py-10 italic">Töltsd be az adatokat...</p>
                </div>
            </div>
        </div>

        <div class="w-full md:w-2/3">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 p-3 border-b border-slate-200 flex justify-between items-center">
                    <h2 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Bevonulási sorrend & Párok</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-500 text-xs uppercase bg-slate-50">
                                <th class="p-4 w-12 text-center">Rend.</th>
                                <th class="p-4">Leader</th>
                                <th class="p-4">Follower</th>
                            </tr>
                        </thead>
                        <tbody id="main-table-body" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://scoring.dance/api/v1/events/373/registrations");
        
        let leaders = [];
        let followers = [];

        async function loadCompetitionData() {
            const btn = document.getElementById('load-btn');
            const division = document.getElementById('division-select').value;
            btn.innerText = "Töltés...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const competitors = JSON.parse(data.contents);

                // Szűrés kategóriára és szerepkörre (Leader/Follower szétválasztás)
                // Megjegyzés: A scoring.dance API struktúrájától függően a 'role' mezőt nézzük
                const filtered = competitors.filter(c => c.division_name.includes(division));
                
                leaders = filtered.filter(c => c.role === "leader" || c.role_name === "Leader");
                followers = filtered.filter(c => c.role === "follower" || c.role_name === "Follower");

                renderLists();
            } catch (error) {
                alert("Hiba az adatok letöltésekor. Próbáld újra!");
                console.error(error);
            } finally {
                btn.innerText = "Adatok Betöltése";
                btn.disabled = false;
            }
        }

        function renderLists() {
            const pool = document.getElementById('follower-pool');
            const table = document.getElementById('main-table-body');
            
            // Followerek listája
            pool.innerHTML = followers.map(f => `
                <div class="p-3 bg-white border border-slate-200 rounded-lg shadow-sm cursor-move hover:border-blue-300 transition text-sm font-medium text-slate-700" data-id="${f.id}">
                    <span class="text-blue-500 mr-2">#${f.bib_number || '?'}</span> ${f.full_name}
                </div>
            `).join('');

            document.getElementById('follower-count').innerText = followers.length;

            // Leaderek táblázata
            table.innerHTML = leaders.map(l => `
                <tr class="group hover:bg-slate-50 transition">
                    <td class="p-4 text-center drag-handle text-slate-300 group-hover:text-slate-500 font-bold">⋮⋮</td>
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-bold">#${l.bib_number || '?'}</span>
                            <span class="font-semibold text-slate-800">${l.full_name}</span>
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="follower-slot min-h-[45px] border-2 border-dashed border-slate-100 rounded-lg p-1 bg-slate-50/50">
                            </div>
                    </td>
                </tr>
            `).join('');

            setupDragAndDrop();
        }

        function setupDragAndDrop() {
            // Followerek mozgatása a poolból a slotokba
            new Sortable(document.getElementById('follower-pool'), {
                group: 'followers',
                animation: 150,
                ghostClass: 'ghost'
            });

            document.querySelectorAll('.follower-slot').forEach(slot => {
                new Sortable(slot, {
                    group: 'followers',
                    animation: 150,
                    ghostClass: 'ghost',
                    onAdd: function (evt) {
                        // Ha már van benne valaki, ne engedjünk többet
                        if (evt.to.children.length > 1) {
                            document.getElementById('follower-pool').appendChild(evt.item);
                        }
                    }
                });
            });

            // Sorok (párok) rendezése
            new Sortable(document.getElementById('main-table-body'), {
                handle: '.drag-handle',
                animation: 150,
                ghostClass: 'ghost'
            });
        }
    </script>
</body>
</html>
