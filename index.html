<!DOCTYPE html>
<html lang="hu">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <input id="judge-name" type="text" placeholder="Bíró neve" class="w-full mb-4 p-2 border rounded">
        <button onclick="loadData()" class="bg-blue-600 text-white px-4 py-2 rounded mb-4 w-full font-bold">LISTA BETÖLTÉSE</button>
        
        <ul id="sortable-list" class="space-y-2">
            </ul>
        
        <button onclick="submitRanking()" class="mt-6 bg-green-600 text-white px-4 py-2 rounded w-full font-bold">RANKING BEKÜLDÉSE</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuv-8S8D-t2CpOeO9PAzBO7qmH0w8fZrQYMFe7-rnwSTfjFPoeEJzrfgj_5gmsgqsk/exec";

        async function loadData() {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json(); // [ ["Leader Bib", ...], ["249", "Rafal", "247", "Stefanie"] ]
            const list = document.getElementById('sortable-list');
            list.innerHTML = "";
            
            data.slice(1).forEach(row => {
                const li = document.createElement('li');
                li.className = "p-3 bg-slate-50 border rounded flex justify-between items-center cursor-move";
                li.dataset.bib = row[0];
                li.innerHTML = `<span><b>#${row[0]}</b> ${row[1]} & <b>#${row[2]}</b> ${row[3]}</span> <span class="rank-badge text-gray-400"></span>`;
                list.appendChild(li);
            });
            new Sortable(list, { animation: 150 });
        }

        async function submitRanking() {
            const name = document.getElementById('judge-name').value;
            if(!name) return alert("Add meg a neved!");
            
            const items = document.querySelectorAll('#sortable-list li');
            let scores = {};
            items.forEach((item, index) => {
                scores[item.dataset.bib] = index + 1; // Helyezés a sorrend alapján
            });

            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "submit_scores", 
                    judgeName: name, 
                    scores: scores 
                })
            });
            alert("Helyezések elmentve!");
        }
    </script>
</body>
</html>
