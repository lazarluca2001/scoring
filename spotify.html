<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Party Dashboard</title>

<style>
:root {
    --bg-color: #050505;
    --text-main: #ffffff;
    --text-dim: #a7a7a7;
    --spotify-green: #1DB954;
    --dislike-red: #ff4444;
}

body {
    margin: 0;
    background: var(--bg-color);
    font-family: 'Segoe UI', sans-serif;
    color: var(--text-main);
}

/* =====================
   MOBILE FIRST LAYOUT
===================== */
.container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 15px;
    height: 100vh;
    overflow-y: auto;
}

/* =====================
   DESKTOP GRID
===================== */
@media (min-width: 900px) {
    .container {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
}

/* =====================
   TRACK CARD
===================== */
.track-card {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    position: relative;
    transition: 0.3s;
}

.track-card img {
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}

.track-card h3 {
    margin: 10px 0 5px;
    font-size: 1rem;
}

.track-card p {
    margin: 0;
    font-size: 0.85rem;
    color: var(--text-dim);
}

/* current kiemelés desktopon */
@media (min-width: 900px) {
    .current {
        transform: scale(1.1);
    }

    .dimmed {
        opacity: 0.4;
        transform: scale(0.85);
    }
}

/* =====================
   RATING
===================== */
.rating-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    background: rgba(255,255,255,0.05);
    padding: 8px;
    border-radius: 50px;
}

.vote-btn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.2s;
    font-size: 1.4rem;
}

.vote-btn:active {
    transform: scale(1.3);
}

.like-btn:active {
    background: var(--spotify-green);
}

.dislike-btn:active {
    background: var(--dislike-red);
}

.score {
    font-size: 1.5rem;
    font-weight: bold;
    min-width: 40px;
}

/* =====================
   EMOJI
===================== */
.float-emoji {
    position: absolute;
    top: 40%;
    left: 50%;
    font-size: 2rem;
    animation: floatUp 0.8s forwards;
    pointer-events: none;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%,0) scale(1); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--x)), -120px) scale(2); }
}
</style>
</head>

<body>

<div class="container" id="dashboard"></div>

<script>
const scores = {};

/* =====================
   VOTE
===================== */
function vote(trackId, val) {
    if (!scores[trackId]) scores[trackId] = 0;
    scores[trackId] += val;

    const el = document.getElementById("score-" + trackId);
    el.innerText = scores[trackId];

    if(scores[trackId] > 0) el.style.color = "#1DB954";
    else if(scores[trackId] < 0) el.style.color = "#ff4444";
    else el.style.color = "#fff";

    spawnEmoji(trackId, val > 0 ? "🔥" : "💩");
}

/* =====================
   EMOJI
===================== */
function spawnEmoji(trackId, emoji) {
    const el = document.createElement("div");
    el.className = "float-emoji";
    el.innerText = emoji;

    const x = (Math.random() - 0.5) * 150;
    el.style.setProperty("--x", x + "px");

    document.getElementById(trackId).appendChild(el);
    setTimeout(() => el.remove(), 800);
}

/* =====================
   RENDER TRACK
===================== */
function createTrack(track, extraClass = "") {
    const div = document.createElement("div");
    div.className = "track-card " + extraClass;
    div.id = track.id;

    div.innerHTML = `
        <img src="${track.img}">
        <h3>${track.name}</h3>
        <p>${track.artist}</p>

        <div class="rating-container">
            <div class="vote-btn dislike-btn" onclick="vote('${track.id}', -1)">👎</div>
            <div class="score" id="score-${track.id}">0</div>
            <div class="vote-btn like-btn" onclick="vote('${track.id}', 1)">🔥</div>
        </div>
    `;

    return div;
}

/* =====================
   DEMO DATA
===================== */
const tracks = [
    { id: "t1", name: "Midnight City", artist: "M83", img: "https://picsum.photos/id/10/300" },
    { id: "t2", name: "Starboy", artist: "The Weeknd", img: "https://picsum.photos/id/12/300" },
    { id: "t3", name: "One More Time", artist: "Daft Punk", img: "https://picsum.photos/id/15/300" },
    { id: "t4", name: "Don't Stop Now", artist: "Dua Lipa", img: "https://picsum.photos/id/20/300" },
    { id: "t5", name: "Levels", artist: "Avicii", img: "https://picsum.photos/id/25/300" }
];

const container = document.getElementById("dashboard");

/* =====================
   RENDER
===================== */
tracks.forEach((track, i) => {
    let cls = "";
    if (i === 2) cls = "current";
    else cls = "dimmed";

    container.appendChild(createTrack(track, cls));
});
</script>

</body>
</html>
