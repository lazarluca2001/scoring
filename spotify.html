<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Spotify DJ Dashboard - Preview</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #181818;
            --text-main: #ffffff;
            --text-dim: #a7a7a7;
            --spotify-green: #1DB954;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            width: 100vw;
            height: 100vh;
            gap: 15px;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .track-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .track-card img {
            width: 90%;
            aspect-ratio: 1/1;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 12px;
            background-color: #282828; /* Placeholder szín */
        }

        .dimmed {
            opacity: 0.35;
            transform: scale(0.8);
        }

        .dimmed h3 { font-size: 0.85rem; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .dimmed p { font-size: 0.7rem; margin: 0; color: var(--text-dim); }

        .current {
            opacity: 1;
            transform: scale(1.15);
            z-index: 5;
        }

        .current img {
            border: 2px solid var(--spotify-green);
            box-shadow: 0 0 50px rgba(29, 185, 84, 0.3);
        }

        .current h3 { font-size: 1.3rem; margin: 12px 0 5px 0; font-weight: 700; }
        .current p { font-size: 1rem; margin: 0; color: var(--spotify-green); font-weight: 500; }

        /* Demo badge */
        #demo-mode-indicator {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            text-transform: uppercase;
        }

        #login-overlay {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .btn-spotify {
            background-color: var(--spotify-green);
            color: white;
            padding: 10px 20px;
            border-radius: 500px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
        }

        @media (orientation: portrait) {
            body::after {
                content: "Fordítsd el a telefont!";
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: var(--bg-color);
                display: flex; align-items: center; justify-content: center;
                z-index: 999; color: var(--spotify-green); font-weight: bold;
            }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <a href="#" id="login-link" class="btn-spotify">API Összekötés</a>
    </div>

    <div id="demo-mode-indicator">Preview Mode</div>

    <div id="dashboard" class="container">
        <div id="prev2" class="track-card dimmed">
            <img src="https://via.placeholder.com/300/181818/ffffff?text=Prev+2" alt="">
            <h3>Múltbéli dallam</h3>
            <p>Előadó neve</p>
        </div>
        <div id="prev1" class="track-card dimmed">
            <img src="https://via.placeholder.com/300/282828/ffffff?text=Prev+1" alt="">
            <h3>Előző szám</h3>
            <p>Zenekar neve</p>
        </div>
        
        <div id="now-playing" class="track-card current">
            <img id="curr-img" src="https://via.placeholder.com/400/1DB954/ffffff?text=Now+Playing" alt="">
            <h3 id="curr-name">Éppen szóló sláger</h3>
            <p id="curr-artist">Fő Előadó</p>
        </div>

        <div id="next1" class="track-card dimmed">
            <img src="https://via.placeholder.com/300/282828/ffffff?text=Next+1" alt="">
            <h3>Következő jön</h3>
            <p>Jövőbeli Előadó</p>
        </div>
        <div id="next2" class="track-card dimmed">
            <img src="https://via.placeholder.com/300/181818/ffffff?text=Next+2" alt="">
            <h3>Majd ez is szól</h3>
            <p>Valaki Más</p>
        </div>
    </div>

    <script>
        // API Konfiguráció (Ha majd meglesz)
        const CLIENT_ID = 'IDE_ÍRD_A_CLIENT_ID_DAT'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const SCOPES = 'user-read-currently-playing user-read-playback-state user-read-recently-played';

        const loginLink = document.getElementById('login-link');
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (CLIENT_ID !== 'IDE_ÍRD_A_CLIENT_ID_DAT') {
            loginLink.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}`;
        }

        if (accessToken) {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('demo-mode-indicator').innerText = "Live Mode";
            document.getElementById('demo-mode-indicator').style.background = "green";
            startLiveUpdates();
        } else {
            // Demo adatok betöltése
            loadDemoData();
        }

        function loadDemoData() {
            const demoTracks = [
                { id: 'prev2', name: "Yesterday", artist: "The Beatles", img: "https://picsum.photos/id/1/300/300" },
                { id: 'prev1', name: "Blinding Lights", artist: "The Weeknd", img: "https://picsum.photos/id/2/300/300" },
                { id: 'now-playing', name: "Bohemian Rhapsody", artist: "Queen", img: "https://picsum.photos/id/3/400/400" },
                { id: 'next1', name: "Levitating", artist: "Dua Lipa", img: "https://picsum.photos/id/4/300/300" },
                { id: 'next2', name: "Starboy", artist: "The Weeknd", img: "https://picsum.photos/id/5/300/300" }
            ];

            demoTracks.forEach(t => {
                const card = document.getElementById(t.id);
                card.querySelector('img').src = t.img;
                card.querySelector('h3').innerText = t.name;
                card.querySelector('p').innerText = t.artist;
            });
        }

        // Itt maradhatnak az eredeti updateAll és fetchSpotify függvények a korábbi kódból...
        function startLiveUpdates() {
            // updateAll() hívása setInterval-al
        }
    </script>
</body>
</html>
