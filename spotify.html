<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Spotify Party Dashboard - Preview</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-dim: #a7a7a7;
            --spotify-green: #1DB954;
            --dislike-red: #ff4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: 18% 18% 28% 18% 18%;
            width: 100vw;
            height: 100vh;
            gap: 10px;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .track-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            transition: all 0.5s ease;
        }

        .track-card img {
            width: 90%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 12px;
        }

        /* Melléksávok */
        .dimmed { opacity: 0.3; transform: scale(0.8); }
        .dimmed h3 { font-size: 0.8rem; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .dimmed p { font-size: 0.65rem; margin: 0; color: var(--text-dim); }

        /* Aktuális dal (Középen) */
        .current { z-index: 10; transform: scale(1.1); }
        .current img { border: 2px solid rgba(255,255,255,0.1); }
        .current h3 { font-size: 1.1rem; margin: 10px 0 5px 0; font-weight: bold; }
        .current p { font-size: 0.9rem; color: var(--spotify-green); margin-bottom: 15px; }

        /* Buli-Mérő Konténer */
        .rating-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 250px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 50px;
            margin-top: 5px;
        }

        .vote-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .vote-btn:active { transform: scale(1.3); }
        .like-btn:active { background: var(--spotify-green); }
        .dislike-btn:active { background: var(--dislike-red); }

        #score-display {
            font-size: 2rem;
            font-weight: 900;
            min-width: 60px;
            transition: color 0.3s ease;
        }

        /* Lebegő Emoji Animáció */
        .float-emoji {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            font-size: 2.5rem;
            z-index: 100;
            top: 30%;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) translateX(var(--x)) scale(2); }
        }

        /* Overlay elemek */
        #login-overlay { position: fixed; top: 10px; left: 10px; z-index: 1000; }
        .btn-api { background: #333; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 12px; opacity: 0.7; }
        #demo-label { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        @media (orientation: portrait) {
            body::after {
                content: "Fordítsd el a kijelzőt fekvő nézetbe!";
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: #000; display: flex; align-items: center; justify-content: center;
                z-index: 9999; color: var(--spotify-green); font-weight: bold;
            }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <a href="#" id="login-link" class="btn-api">API Összekötés</a>
    </div>

    <div id="demo-label">Demo Preview Mode</div>

    <div id="dashboard" class="container">
        <div id="prev2" class="track-card dimmed"><img src="" alt=""><h3>-</h3><p>-</p></div>
        <div id="prev1" class="track-card dimmed"><img src="" alt=""><h3>-</h3><p>-</p></div>
        
        <div id="now-playing" class="track-card current">
            <img id="curr-img" src="" alt="">
            <h3 id="curr-name">Betöltés...</h3>
            <p id="curr-artist">-</p>

            <div class="rating-container">
                <div class="vote-btn dislike-btn" onclick="vote(-1)">👎</div>
                <div id="score-display">0</div>
                <div class="vote-btn like-btn" onclick="vote(1)">🔥</div>
            </div>
        </div>

        <div id="next1" class="track-card dimmed"><img src="" alt=""><h3>-</h3><p>-</p></div>
        <div id="next2" class="track-card dimmed"><img src="" alt=""><h3>-</h3><p>-</p></div>
    </div>

    <script>
        // --- KONFIGURÁCIÓ ---
        const CLIENT_ID = 'IDE_ÍRD_A_CLIENT_ID_DAT'; 
        let currentScore = 0;
        let lastTrackId = "demo-123";

        // Adatkezelés (Demo vagy API)
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (accessToken) {
            document.getElementById('demo-label').innerText = "Live Mode";
            document.getElementById('login-overlay').style.display = "none";
            startLiveUpdates();
        } else {
            loadDemoData();
        }

        function vote(val) {
            currentScore += val;
            const scoreDisp = document.getElementById('score-display');
            scoreDisp.innerText = currentScore;
            
            // Szín visszajelzés
            if(currentScore > 0) scoreDisp.style.color = "#1DB954";
            else if(currentScore < 0) scoreDisp.style.color = "#ff4444";
            else scoreDisp.style.color = "#ffffff";

            spawnEmoji(val > 0 ? '🔥' : '💩');
        }

        function spawnEmoji(emojiText) {
            const el = document.createElement('div');
            el.className = 'float-emoji';
            el.innerText = emojiText;
            const xDir = (Math.random() - 0.5) * 150;
            el.style.setProperty('--x', `${xDir}px`);
            el.style.left = "50%";
            document.getElementById('now-playing').appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function loadDemoData() {
            const tracks = [
                { id: 'prev2', name: "Midnight City", artist: "M83", img: "https://picsum.photos/id/10/300/300" },
                { id: 'prev1', name: "Starboy", artist: "The Weeknd", img: "https://picsum.photos/id/12/300/300" },
                { id: 'now-playing', name: "One More Time", artist: "Daft Punk", img: "https://picsum.photos/id/15/400/400" },
                { id: 'next1', name: "Don't Stop Now", artist: "Dua Lipa", img: "https://picsum.photos/id/20/300/300" },
                { id: 'next2', name: "Levels", artist: "Avicii", img: "https://picsum.photos/id/25/300/300" }
            ];

            tracks.forEach(t => {
                const card = document.getElementById(t.id);
                card.querySelector('img').src = t.img;
                if(t.id === 'now-playing') {
                    document.getElementById('curr-name').innerText = t.name;
                    document.getElementById('curr-artist').innerText = t.artist;
                } else {
                    card.querySelector('h3').innerText = t.name;
                    card.querySelector('p').innerText = t.artist;
                }
            });
        }

        function startLiveUpdates() {
            // Itt futna a korábban megírt fetchSpotify('me/player/currently-playing') 
            // és a track ID figyelése a score nullázásához.
            setInterval(async () => {
                // Ide jönne a valódi API hívás logikája
            }, 3000);
        }
    </script>
</body>
</html>
