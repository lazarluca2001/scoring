<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Spotify DJ Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #181818;
            --text-main: #ffffff;
            --text-dim: #a7a7a7;
            --spotify-green: #1DB954;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Fektetett elrendezés 5 sávval */
        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            width: 100vw;
            height: 100vh;
            gap: 15px;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .track-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .track-card img {
            width: 90%;
            aspect-ratio: 1/1;
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 12px;
        }

        /* Mellékszálak (Előző/Következő) */
        .dimmed {
            opacity: 0.3;
            transform: scale(0.8);
        }

        .dimmed h3 { font-size: 0.85rem; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .dimmed p { font-size: 0.7rem; margin: 0; color: var(--text-dim); }

        /* Aktuális dal (Középen) */
        .current {
            opacity: 1;
            transform: scale(1.1);
            z-index: 5;
        }

        .current img {
            border: 2px solid var(--spotify-green);
            box-shadow: 0 0 40px rgba(29, 185, 84, 0.2);
        }

        .current h3 { font-size: 1.2rem; margin: 12px 0 5px 0; color: var(--text-main); }
        .current p { font-size: 0.95rem; margin: 0; color: var(--spotify-green); font-weight: 500; }

        /* Login gomb */
        #login-screen {
            text-align: center;
        }

        .btn-spotify {
            background-color: var(--spotify-green);
            color: white;
            padding: 16px 32px;
            border-radius: 500px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            transition: transform 0.2s;
            display: inline-block;
        }

        .btn-spotify:hover { transform: scale(1.05); }
        .hidden { display: none !important; }

        @media (orientation: portrait) {
            body::after {
                content: "Kérlek, fordítsd el a telefont fekvő nézetbe!";
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: var(--bg-color);
                display: flex; align-items: center; justify-content: center;
                z-index: 999; color: var(--spotify-green); text-align: center; padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="margin-bottom: 30px;">Spotify DJ Dashboard</h1>
        <a href="#" id="login-link" class="btn-spotify">Belépés Spotify-jal</a>
    </div>

    <div id="dashboard" class="container hidden">
        <div id="prev2" class="track-card dimmed"><img src="" alt=""><h3>-</h3><p>-</p></div>
        <div id="prev1" class="track-card dimmed"><img src="" alt=""><h3>-</h3><p>-</p></div>
        
        <div id="now-playing" class="track-card current">
            <img id="curr-img" src="" alt="">
            <h3 id="curr-name">Nincs lejátszás</h3>
            <p id="curr-artist">-</p>
        </div>

        <div id="next1" class="track-card dimmed"><img src="" alt=""><h3>-</h3><p>-</p></div>
        <div id="next2" class="track-card dimmed"><img src="" alt=""><h3>-</h3><p>-</p></div>
    </div>

    <script>
        const CLIENT_ID = 'IDE_ÍRD_A_CLIENT_ID_DAT'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const SCOPES = 'user-read-currently-playing user-read-playback-state user-read-recently-played';

        const loginLink = document.getElementById('login-link');
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');

        // Login URL generálása
        loginLink.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}`;

        // Token ellenőrzése az URL-ben
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (accessToken) {
            loginScreen.classList.add('hidden');
            dashboard.classList.remove('hidden');
            
            // Frissítési ciklus indítása
            updateAll();
            setInterval(updateAll, 3000); // 3 másodpercenként frissít
        }

        async function fetchSpotify(endpoint) {
            try {
                const res = await fetch(`https://api.spotify.com/v1/${endpoint}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (res.status === 204) return null;
                return await res.json();
            } catch (e) { return null; }
        }

        async function updateAll() {
            // 1. Most szóló lekérése
            const current = await fetchSpotify('me/player/currently-playing');
            if (current && current.item) {
                fillCard('now-playing', current.item, false);
            }

            // 2. Következők lekérése (Queue)
            const queueData = await fetchSpotify('me/player/queue');
            if (queueData && queueData.queue) {
                fillCard('next1', queueData.queue[0], true);
                fillCard('next2', queueData.queue[1], true);
            }

            // 3. Korábbiak lekérése (History)
            const historyData = await fetchSpotify('me/player/recently-played?limit=2');
            if (historyData && historyData.items) {
                fillCard('prev1', historyData.items[0].track, true);
                fillCard('prev2', historyData.items[1].track, true);
            }
        }

        function fillCard(id, track, isDimmed) {
            if (!track) return;
            const container = document.getElementById(id);
            const img = container.querySelector('img');
            const h3 = container.querySelector('h3') || document.getElementById('curr-name');
            const p = container.querySelector('p') || document.getElementById('curr-artist');

            const title = track.name;
            const artist = track.artists.map(a => a.name).join(', ');
            const artUrl = track.album.images[0].url;

            if (img.src !== artUrl) img.src = artUrl;
            h3.innerText = title;
            p.innerText = artist;
        }
    </script>
</body>
</html>
